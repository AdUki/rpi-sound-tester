BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "soundtester"
BBFILE_PATTERN_soundtester = "^${LAYERDIR}/"
BBFILE_PRIORITY_soundtester = "10"

LAYERDEPENDS_soundtester = "core raspberrypi"
LAYERSERIES_COMPAT_soundtester = "scarthgap"

# The device-specific settings (hostname, password, Wi-Fi) live here so nobody has to edit
# a recipe to build an image for a different bench.
require ${LAYERDIR}/conf/soundtester-device.conf
