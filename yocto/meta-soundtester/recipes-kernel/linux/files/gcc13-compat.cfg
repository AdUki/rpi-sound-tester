# Building a 5.15 kernel with scarthgap's GCC 13.
#
# The kernel's GCC plugins are compiled against the host compiler's plugin headers, and
# 5.15's plugin sources predate GCC 13: scripts/gcc-plugins/gcc-common.h fails with
# "use of enum 'gsi_iterator_update' without previous declaration" and the build dies on
# arm_ssp_per_task_plugin.so.
#
# The plugins are optional hardening, so turn them off. ARM's STACKPROTECTOR_PER_TASK
# selects the ARM SSP plugin, so it has to go too — the stack protector itself stays on,
# just with a global canary rather than a per-task one.
# CONFIG_GCC_PLUGINS is not set
# CONFIG_STACKPROTECTOR_PER_TASK is not set
