# The Pi 3 defconfigs already carry these (bcm2709_defconfig has
# CONFIG_SND_AUDIOINJECTOR_OCTO_SOUNDCARD=m, and its Kconfig selects the CS42448 codec),
# but state them explicitly so a defconfig change upstream cannot silently drop the card.
CONFIG_SND_SOC=m
CONFIG_SND_BCM2835_SOC_I2S=m
CONFIG_SND_SOC_CS42XX8=m
CONFIG_SND_SOC_CS42XX8_I2C=m
CONFIG_SND_AUDIOINJECTOR_OCTO_SOUNDCARD=m
