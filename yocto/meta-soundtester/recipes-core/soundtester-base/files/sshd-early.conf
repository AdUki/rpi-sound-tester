[Unit]
# Come up before sysinit.target, not after it. A failure anywhere in sysinit (a bad mount,
# a failed local-fs) otherwise drops the machine into emergency.target, which waits on a
# console nobody is watching — while networkd, which has DefaultDependencies=no, has
# already brought the network up. The result is a board that answers ping and DHCP and
# accepts no connections at all. Being able to ssh in is what turns that into a bug report.
DefaultDependencies=no
After=systemd-udevd.service
Before=sysinit.target
