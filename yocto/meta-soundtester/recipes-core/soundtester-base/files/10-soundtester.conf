# Drop-in, pulled in by the "Include /etc/ssh/sshd_config.d/*.conf" line that OE's
# sshd_config already carries. Shipping our own /etc/ssh/sshd_config instead would collide
# with the file openssh-sshd already owns and the rootfs would fail to build.
PermitRootLogin yes
PasswordAuthentication yes
PermitEmptyPasswords no

# Host keys live on the writable data partition. The rootfs is read-only and /var is a
# tmpfs, so keys kept in either place would be regenerated on every boot and every login
# would warn that the host key changed. soundtester-sshkeys.service creates these before
# sshdgenkeys.service runs, so OpenSSH's own generator finds them already present.
HostKey /data/ssh/ssh_host_ed25519_key
HostKey /data/ssh/ssh_host_rsa_key
